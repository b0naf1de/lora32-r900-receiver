; LilyGO LoRa32 V2.1.6 (ESP32-PICO-D4 + SX1276) — Neptune R900 water-meter receiver
;
; >>> env:optionb is THE working firmware (RSSI-envelope capture + on-MCU R900 decode + MQTT/OLED).
;     `pio run -t upload` builds it by default.
; env:lora32-r900 is the EXPERIMENTAL hardware-OOK-slicer path (rtl_433_ESP). It is kept for
;     reference only: the SX127x slicer cannot reproduce R900's sustained multi-chip pulses, so it
;     does NOT decode R900 (it does decode slower OOK sensors). See README "Why this exists".
;
; No secrets file needed: the device boots blank and is configured via its Wi-Fi setup portal
; (join the "R900-Reader-Setup" AP, open http://192.168.4.1/setup).
; Set upload_port below to your board's serial device (find it with: pio device list).

[platformio]
default_envs = optionb

[env:lora32-r900]
platform = espressif32
board = ttgo-lora32-v21            ; defines ARDUINO_TTGO_LoRa32_v21new -> auto RF_SX1276 + pins
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbserial-59260134191
monitor_port = /dev/cu.usbserial-59260134191
build_src_filter = +<*> -<main_optionb.cpp>

lib_deps =
  https://github.com/NorthernMan54/rtl_433_ESP
  jgromes/RadioLib@^6.0.0
  bblanchon/ArduinoJson@^6.21.2
  thijse/ArduinoLog@^1.1.1

build_flags =
  '-DLOG_LEVEL=LOG_LEVEL_TRACE'
  '-DONBOARD_LED=25'
  '-DRF_MODULE_FREQUENCY=915.662'   ; parked on our meter's channel (RTL-SDR oracle 2026-06-28)
  '-DOOK_MODULATION=true'
  '-DSX127X_RXBANDWIDTH=100'        ; R900-fix 2026-06-29: 250(max) is noisy; R900 needs ~65kHz, narrowing cleans envelope/SNR
  '-DOOK_FIXED_THRESHOLD=30'         ; FIXED-type active level (2026-06-29); moderate, catches strong meter bursts well above noise
  '-DOOK_BITRATE=32.768'             ; R900-fix: OOK peak-detector chip clock; was 1.2 (833us/chip) -> smeared R900 to ~64us. 32.768=R900 rate
  '-DOOK_THRESH_TYPE=RADIOLIB_SX127X_OOK_THRESH_AVERAGE'  ; AVERAGE gave cleanest 1x cluster; pairing w/ narrow RxBw + fixed gain
  '-DOOK_FIXED_GAIN=1'              ; R900-fix 2026-06-29: AGC off, max LNA gain (no mid-pulse gain changes)
  '-DMINIMUM_PULSE_LENGTH=25'       ; Patch 01 applied 2026-06-28 -> guard active; R900 pulse ~30us
  ; '-DMINIMUM_SIGNAL_LENGTH=4000'  ; optional; also sets dropout-tolerance window
  ; --- diagnostics; turn OFF once decoding ---
  '-DRF_MODULE_INIT_STATUS=true'
  '-DDEMOD_DEBUG=true'
  '-DPUBLISH_UNPARSED=true'
  ; '-DSIGNAL_RSSI=true'
  ; '-DRTL_VERBOSE=95'              ; Neptune R900 decoder verbose (confirm index in rtl_433_ESP.cpp)

; --- Option B de-risk: standalone RadioLib RSSI-envelope capture (bypasses hardware OOK slicer) ---
[env:optionb]
platform = espressif32
board = ttgo-lora32-v21
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbserial-59260134191
monitor_port = /dev/cu.usbserial-59260134191
build_src_filter = +<main_optionb.cpp>
lib_deps =
  jgromes/RadioLib@^6.0.0
  knolleary/PubSubClient@^2.8
  olikraus/U8g2@^2.35.19
  bblanchon/ArduinoJson@^6.21.2                        ; JSON for the custom config-portal API
build_flags =
  '-DOPTIONB=1'
  '-DRADIOLIB_LOW_LEVEL=1'
  ; '-DDUMP_RAW=1'      ; enable to also dump CAP hex (host cross-check); off = on-MCU decode only

; one-off diagnostic: sweep every band window, camp 25min each, log decodes to serial (COV-* lines).
; pio run -e coverage -t upload  then capture serial to a file overnight; analyse in post.
[env:coverage]
extends = env:optionb
build_flags =
  '-DOPTIONB=1'
  '-DRADIOLIB_LOW_LEVEL=1'
  '-DFREQ_COVERAGE_TEST=1'
